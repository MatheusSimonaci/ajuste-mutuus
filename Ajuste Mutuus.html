const melhorias = [
{
  id: 1,
  titulo: "Uma pergunta por vez",
  descricao: "O agente estava finalizando mensagens com duas perguntas ao mesmo tempo. Agora a regra é explícita: apenas uma pergunta por mensagem.",
  impacto: "Conversas mais naturais e menos sobrecarregadas para o prospecto.",
  casos: ["Simone / CONPASUL"],
  casoAutor: "Clara Andrade",
  linhas: [
  { t: 'ctx', v: 'Usa linguagem relaxada, é simpático, utiliza emojis, mas não usa gírias.' },
  { t: 'ctx', v: '' },
  { t: 'rem', v: 'Finaliza a resposta com uma pergunta para dar continuidade ao script de vendas, a não ser que o objetivo seja encerrar a conversa.' },
  { t: 'add', v: 'NUNCA faça mais de uma pergunta por mensagem. Uma pergunta. Sempre.' },
  { t: 'add', v: '' },
  { t: 'add', v: 'Finaliza a resposta com a pergunta do passo atual do roteiro, nada mais.' }]

},
{
  id: 2,

  casos: ["Simone / CONPASUL"],
  casoAutor: "Clara Andrade",
  linhas: [
  { t: 'ctx', v: 'Usa linguagem relaxada, é simpático, utiliza emojis, mas não usa gírias.' },
  { t: 'ctx', v: '' },
  { t: 'add', v: 'NUNCA colete informações que não sejam explicitamente solicitadas pelo roteiro.' },
  { t: 'add', v: 'Não pergunte faixa de valor, vigência, estado, tipo de garantia ou qualquer dado adicional além do que o passo atual exige.' }]

},
{
  id: 3,
  titulo: "Foco total em cada etapa do roteiro",
  descricao: "A instrução anterior deixava margem para o agente adicionar informações que achasse relevantes. Agora ele responde exatamente o que a etapa atual pede.",
  impacto: "Respostas mais objetivas e alinhadas ao roteiro de vendas.",
  casos: [],

  linhas: [

},
{

  titulo: "Sem repetir a apresentação já enviada",

  casoAutor: "Clara Andrade",
  linhas: [
  { t: 'ctx', v: 'Execute os passos NA ORDEM.' },
  { t: 'ctx', v: '' },
  { t: 'add', v: 'Antes de executar o PASSO 1, leia o histórico da conversa.' },
  { t: 'add', v: 'Se o contexto da Mutuus e o motivo do contato já foram apresentados anteriormente, NÃO os repita.' },
  { t: 'add', v: 'Vá direto à pergunta sobre a operação da empresa.' }]

},
{
  id: 5,
  titulo: "Na cotação, pedir apenas o código",
  descricao: "A instrução \"receba todas as informações\" era vaga demais. O agente entendia isso como permissão para fazer perguntas extras. Agora só o código da cotação é solicitado.",
  impacto: "Etapa de cotação mais rápida e sem desvios.",
  casos: ["Simone / CONPASUL"],
  casoAutor: "Clara Andrade",
  linhas: [
  { t: 'ctx', v: 'Envie o link de cotação e peça o código que aparece no site.' },
  { t: 'ctx', v: '' },
  { t: 'rem', v: 'RECEBA TODAS AS INFORMAÇÕES. NÃO TENHA PRESSA.' },
  { t: 'add', v: 'NÃO COLETE NENHUMA OUTRA INFORMAÇÃO ALÉM DO CÓDIGO DA COTAÇÃO.' }]

}];


const bonus = {
  titulo: "Template de abertura usa apenas o primeiro nome",
  descricao: "O nome vinha do cadastro em letras maiúsculas e completo. Agora o sistema formata automaticamente, usando só o primeiro nome com capitalização correta.",
  exemplos: ['"SIMONE APARECIDA COSTA" → "Simone"', '"MARCELO RODRIGUES KUNZ" → "Marcelo"', '"ODAIR FERREIRA LIMA" → "Odair"'],
  linhas: [
  { t: 'ctx', v: '// Antes do envio do template de abertura' },
  { t: 'rem', v: 'Nome: "SIMONE APARECIDA COSTA"' },
  { t: 'add', v: 'Nome: "Simone"' }]

};

// ── Diff viewer (dark, GitHub-style) ─────────────────────────────────────────
function DiffViewer({ linhas }) {
  return (
    <div style={{
      background: '#0d1117', borderRadius: '0 0 8px 8px',
      fontFamily: 'JetBrains Mono', overflow: 'hidden'
    }}>
      {linhas.map((l, i) => {
        const bg = l.t === 'add' ? '#1a4f2a' : l.t === 'rem' ? '#4a1014' : 'transparent';
        const borda = l.t === 'add' ? '2px solid #2ea043' : l.t === 'rem' ? '2px solid #f85149' : '2px solid transparent';
        const cor = l.t === 'add' ? '#7ce38b' : l.t === 'rem' ? '#f85149' : '#8b949e';
        const pfx = l.t === 'add' ? '+' : l.t === 'rem' ? '−' : ' ';
        const corPfx = l.t === 'add' ? '#2ea043' : l.t === 'rem' ? '#f85149' : '#484f58';
        return (
          <div key={i} style={{ display: 'flex', background: bg, borderLeft: borda, minHeight: 22 }}>
            <span style={{ width: 24, flexShrink: 0, textAlign: 'center', color: corPfx, fontSize: 12, lineHeight: '22px', userSelect: 'none' }}>{pfx}</span>
            <span style={{ fontSize: 12, lineHeight: '22px', color: cor, padding: '0 10px', whiteSpace: 'pre-wrap', flex: 1, wordBreak: 'break-word' }}>{l.v}</span>
          </div>);

      })}
    </div>);

}

// ── Card de melhoria ──────────────────────────────────────────────────────────
function CardMelhoria({ m, tweaks }) {
  const [aberto, setAberto] = useState(false);
  return (
    <div style={{
      background: '#fff',
      border: '1px solid #e2e8f0',
      borderRadius: 10,
      overflow: 'hidden',
      transition: 'box-shadow 0.2s',
      boxShadow: aberto ? '0 4px 20px rgba(0,0,0,0.08)' : '0 1px 3px rgba(0,0,0,0.04)'
    }}>
      {/* Linha de número + título */}
      <div style={{ display: 'flex', alignItems: 'flex-start', gap: 14, padding: '18px 20px 14px' }}>
        <span style={{
          width: 28, height: 28, borderRadius: '50%', flexShrink: 0,
          background: azulClaro, border: `1.5px solid ${azulBorda}`,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontSize: 12, fontWeight: 700, color: azul, marginTop: 1
        }}>{m.id}</span>
        <div style={{ flex: 1 }}>
          <div style={{ fontWeight: 600, fontSize: 15, color: '#0f172a', marginBottom: 5 }}>{m.titulo}</div>
          <div style={{ fontSize: 13.5, color: '#475569', lineHeight: 1.6, marginBottom: 8 }}>{m.descricao}</div>
          <div style={{
            display: 'inline-flex', alignItems: 'center', gap: 6,
            fontSize: 12.5, color: '#059669',
            background: '#ecfdf5', borderRadius: 6, padding: '4px 10px'
          }}>
            <span>✓</span> {m.impacto}
          </div>
          {m.casos.length > 0 &&
          <div style={{ marginTop: 8, display: 'flex', gap: 6, flexWrap: 'wrap', alignItems: 'center' }}>
              <span style={{ fontSize: 11.5, color: '#94a3b8' }}>Identificado em:</span>
              {m.casos.map((c) =>
            <span key={c} style={{
              fontSize: 11, fontFamily: 'JetBrains Mono',
              background: '#f1f5f9', border: '1px solid #e2e8f0',
              padding: '2px 7px', borderRadius: 5, color: '#475569'
            }}>{c}</span>
            )}
              {m.casoAutor && <span style={{ fontSize: 11, color: '#94a3b8', fontStyle: 'italic' }}>via {m.casoAutor}</span>}
            </div>
          }
        </div>
      </div>

      {/* Toggle detalhes técnicos */}
      <div
        onClick={() => setAberto((v) => !v)}
        style={{
          display: 'flex', alignItems: 'center', gap: 7,
          padding: '9px 20px 9px 62px',
          borderTop: '1px solid #f1f5f9',
          cursor: 'pointer',

          fontFamily: 'JetBrains Mono',

}

// ── App principal ─────────────────────────────────────────────────────────────
function App() {

  const [bonusAberto, setBonusAberto] = useState(false);

  useEffect(() => {

      if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').style.display = 'none';
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  }, []);

  return (
    <div style={{ minHeight: '100vh', background: '#f4f6f9' }}>

      {/* ── CABEÇALHO ── */}

              display: 'flex', alignItems: 'center', gap: 8,
              background: s.bg, borderRadius: 8, padding: '8px 14px'
            }}>

                <span style={{ fontSize: 12, color: s.cor ? s.cor + 'cc' : 'rgba(255,255,255,0.7)' }}>{s.l}</span>

            O modelo de inteligência artificial foi atualizado para uma versão mais recente, que é mais criativa e proativa. O mesmo roteiro que funcionava antes passou a gerar respostas fora do esperado, porque as regras que antes eram subentendidas precisavam agora ser escritas de forma explícita.

            Melhoria extra

          <div style={{

                  {c.empresa && (

                  fontSize: 11.5, color: '#059669', background: '#ecfdf5',
                  padding: '3px 9px', borderRadius: 20, fontWeight: 500,
                }}>✓ validado</span>
              </div>
            ))}

        </div>

        {/* Rodapé */}
        <div style={{
          marginTop: 40, paddingTop: 28, borderTop: 'none',
          display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 12,
          background: '#000000', margin: '40px -28px -80px', padding: '24px 28px',
          borderRadius: '0 0 0 0',
        }}>
          <img src={window.__resources?.logoDiwo || './logo-diwo.png'} alt="diwo" style={{ height: 24 }} />
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 3 }}>

        <div style={{ fontSize: 11, fontWeight: 600, color: '#e2e8f0', textTransform: 'uppercase', letterSpacing: '0.06em' }}>Tweaks</div>
        {[
        { key: 'accentColor', label: 'Cor de destaque' },
        { key: 'headerBg', label: 'Fundo do cabeçalho' }].
        map(({ key, label }) =>
        <label key={key} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', fontSize: 12, color: '#94a3b8' }}>
            {label}
            <input type="color" defaultValue={tweaks[key]}
          onChange={(e) => {
            tweaks[key] = e.target.value;
            window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: e.target.value } }, '*');
          }}
          style={{ width: 28, height: 22, border: 'none', borderRadius: 4, cursor: 'pointer' }} />
          
          </label>
        )}
      </div>
    </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
